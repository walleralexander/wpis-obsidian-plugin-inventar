name: Release

on:
  push:
    tags:
      - "v*"

env:
  NODE_OPTIONS: --max-old-space-size=4096
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Configure npm
        run: npm config set fetch-timeout 120000 && npm config set fetch-retry-mintimeout 10000 && npm config set fetch-retry-maxtimeout 120000

      - name: Install dependencies
        run: npm install --verbose

      - name: Build plugin
        run: npm run build

      - name: Copy manifest to dist
        run: cp manifest.json dist/manifest.json

      - name: Package plugin zip
        run: |
          mkdir -p release/wpis-plugin-inventar
          cp dist/main.js release/wpis-plugin-inventar/main.js
          cp manifest.json release/wpis-plugin-inventar/manifest.json
          if [ -f styles.css ]; then
            cp styles.css release/wpis-plugin-inventar/styles.css
          fi
          cd release
          zip -r "../wpis-plugin-inventar-${GITHUB_REF_NAME}.zip" "wpis-plugin-inventar"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wpis-plugin-inventar-${{ github.ref_name }}.zip
            dist/main.js
            dist/manifest.json
          draft: false
          prerelease: false
