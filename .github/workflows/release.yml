name: Release

on:
  push:
    tags:
      - "v*"

env:
  NODE_OPTIONS: --max-old-space-size=4096
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Configure npm
        run: npm config set fetch-timeout 120000 && npm config set fetch-retry-mintimeout 10000 && npm config set fetch-retry-maxtimeout 120000

      - name: Install dependencies
        run: npm install --verbose

      - name: Build plugin
        run: npm run build

      - name: Copy manifest to dist
        run: cp manifest.json dist/manifest.json

      - name: Package plugin zip
        run: |
          mkdir -p release/wpis-plugin-inventar
          cp dist/main.js release/wpis-plugin-inventar/main.js
          cp manifest.json release/wpis-plugin-inventar/manifest.json
          if [ -f styles.css ]; then
            cp styles.css release/wpis-plugin-inventar/styles.css
          fi
          cd release
          zip -r "../wpis-plugin-inventar-${GITHUB_REF_NAME}.zip" "wpis-plugin-inventar"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wpis-plugin-inventar-${{ github.ref_name }}.zip
            dist/main.js
            dist/manifest.json
          draft: false
          prerelease: false

      - name: Verify latest release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import io
          import json
          import os
          import sys
          import time
          import urllib.request
          import zipfile

          repo = os.environ["GITHUB_REPOSITORY"]
          tag = os.environ["GITHUB_REF_NAME"]
          token = os.environ["GH_TOKEN"]
          expected_asset = f"wpis-plugin-inventar-{tag}.zip"
          latest_release_url = f"https://api.github.com/repos/{repo}/releases/latest"

          headers = {
            "Authorization": f"Bearer {token}",
            "Accept": "application/vnd.github+json",
          }

          latest = None
          for _ in range(10):
            req = urllib.request.Request(latest_release_url, headers=headers)
            with urllib.request.urlopen(req) as response:
              latest = json.load(response)

            if latest.get("tag_name") == tag:
              break

            time.sleep(6)

          if latest is None or latest.get("tag_name") != tag:
            print(f"Latest release tag mismatch. Expected {tag}, got {latest.get('tag_name') if latest else 'none'}")
            sys.exit(1)

          assets = latest.get("assets", [])
          match = next((asset for asset in assets if asset.get("name") == expected_asset), None)
          if not match:
            print(f"Expected release asset not found: {expected_asset}")
            sys.exit(1)

          download_headers = {
            "Authorization": f"Bearer {token}",
            "Accept": "application/octet-stream",
          }
          asset_req = urllib.request.Request(match["url"], headers=download_headers)
          with urllib.request.urlopen(asset_req) as response:
            zip_bytes = response.read()

          with zipfile.ZipFile(io.BytesIO(zip_bytes)) as archive:
            names = set(archive.namelist())

          required_paths = {
            "wpis-plugin-inventar/main.js",
            "wpis-plugin-inventar/manifest.json",
          }
          missing = sorted(path for path in required_paths if path not in names)
          if missing:
            print("Release asset zip is missing required plugin files:")
            for missing_path in missing:
              print(f" - {missing_path}")
            sys.exit(1)

          print(f"Verified latest release asset {expected_asset} with required plugin files.")
          PY
